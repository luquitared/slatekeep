<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlateKeep</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #242836;
        --border: #2e3347;
        --text: #e4e6f0;
        --text2: #8b8fa3;
        --accent: #6c8cff;
        --accent-hover: #5a7aee;
        --danger: #ff6b6b;
        --success: #51cf66;
        --radius: 8px;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      input, textarea, select, button {
        font-family: inherit;
        font-size: 0.95rem;
      }
      input, textarea {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: var(--radius);
        padding: 0.6rem 0.8rem;
        width: 100%;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus, textarea:focus { border-color: var(--accent); }
      textarea { resize: vertical; min-height: 200px; }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        padding: 0.6rem 1.2rem;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.15s;
      }
      button:hover { background: var(--accent-hover); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary { background: var(--surface2); border: 1px solid var(--border); }
      button.secondary:hover { background: var(--border); }
      button.danger { background: var(--danger); }
      button.danger:hover { background: #e05555; }
      label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: var(--text2); }
      .field { margin-bottom: 1rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
